<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Enterprise Anti-Phishing Training Platform{% endblock %}</title>
    <style>
        .container { width: 90%; margin: 30px auto; }
        nav { background: #222222; padding: 12px; color: #fff; }
        nav a { color: #fff; margin: 0 12px; text-decoration: none; }
        .mail-card { border: 1px solid #cccccc; padding: 16px; margin: 12px 0; border-radius: 6px; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
    {% if user.is_authenticated %}
        Welcome, {{ user.username }} | Role: {{ user.get_role_display }}
        <a href="{% url 'inbox' %}">My Role-Specific Inbox</a>
        <a href="{% url 'profile' %}">Personal Center</a>
        <a href="{% url 'logout' %}">Sign Out</a>
    {% else %}
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'register' %}">New User Registration</a>
        <a href="{% url 'login' %}">Log In</a>
    {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
